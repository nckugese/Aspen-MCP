category: blocks/radfrac
block_type: RadFrac
description: "RadFrac rigorous distillation column"
ports:
  - name: "F(IN)"
    description: "Feed inlet"
  - name: "LD(OUT)"
    description: "Liquid distillate outlet (top)"
  - name: "B(OUT)"
    description: "Bottoms outlet"
  - name: "VD(OUT)"
    description: "Vapor distillate outlet (top)"
properties:
  - name: number_of_stages
    aspen_path: "\\Data\\Blocks\\{block_name}\\Input\\NSTAGE"
    type: integer
    description: "Number of theoretical stages"

  - name: condenser_type
    aspen_path: "\\Data\\Blocks\\{block_name}\\Input\\CONDENSER"
    type: string
    description: "Condenser type (TOTAL, PARTIAL-V, PARTIAL-V-L, NONE)"

  - name: reboiler_type
    aspen_path: "\\Data\\Blocks\\{block_name}\\Input\\REBOILER"
    type: string
    description: "Reboiler type (KETTLE, THERMOSIPHON, NONE)"

  - name: reflux_ratio
    aspen_path: "\\Data\\Blocks\\{block_name}\\Input\\BASIS_RR"
    type: float
    description: "Reflux ratio"

  - name: distillate_to_feed_ratio
    aspen_path: "\\Data\\Blocks\\{block_name}\\Input\\D:F"
    type: float
    description: "Distillate to feed ratio"

  - name: feed_stage
    aspen_path: "\\Data\\Blocks\\{block_name}\\Input\\FEED_STAGE\\{stream_name}"
    type: integer
    description: "Feed stage number for a given feed stream"

  - name: condenser_pressure
    aspen_path: "\\Data\\Blocks\\{block_name}\\Input\\PRES1"
    type: float
    description: "Condenser pressure (stage 1 pressure)"
